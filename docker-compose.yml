version: '3'
services:
  h2:
    image: oscarfonts/h2
    container_name: media-library-h2
    ports:
      - "9092:9092"
      - "8082:8082"
    command: >
      sh -c "java -cp /opt/h2/bin/h2*.jar org.h2.tools.Server
      -tcp -tcpAllowOthers
      -web -webAllowOthers
      -baseDir /opt/h2-data"
    volumes:
      - ./h2-data:/opt/h2-data

  app:
    build: .
    container_name: media-library-app
    ports:
      - "8080:8080"
    depends_on:
      - h2